<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Component Design</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Advanced Component Design</h1>

<button id="openModal">Open Modal</button>

<div class="accordion">
<button class="accordion-btn">Accordion Item</button>
<div class="panel">
<p>This is an expandable accordion section.</p>
</div>
</div>

<button id="toastBtn">Show Toast</button>

<div id="toast">Operation Successful!</div>

<div id="modal" class="modal">
<div class="modal-content">
<span id="closeModal">&times;</span>
<h2>Modal Component</h2>
<p>This is a reusable modal popup.</p>
</div>
</div>

<script src="script.js"></script>

</body>
</html>
